{% extends "base.html" %}

{% block title %}Edit Header | {{ ui.site_title }}{% endblock %}

{% block content %}
<p>
    <a href="{% url 'staff_reading_plan_list' %}">← Back to Reading Plan Admin</a>
</p>

<div class="page-header">
    <h1 class="page-title">Edit Reading Plan Header</h1>
    <p class="page-subtitle">
        {{ plan.name }}
    </p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Save Header
        </button>

        <a class="button button-secondary"
           href="{% url 'staff_reading_plan_days' plan.id %}">
            Edit Days
        </a>
    </form>
</div>
{% endblock %}
