{% extends "base.html" %}

{% block title %}{{ ui.change_password }} | {{ ui.site_title }}{% endblock %}

{% block content %}
<p>
    <a href="{% url 'profile' %}">← {{ ui.back_to_profile }}</a>
</p>

<div class="page-header">
    <h1 class="page-title">{{ ui.change_password }}</h1>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            {{ ui.change_password }}
        </button>
    </form>
</div>
{% endblock %}
