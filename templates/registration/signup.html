{% extends "base.html" %}

{% block title %}Create Account | Bible Reading{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Create Account</h1>
    <p class="page-subtitle">Join your small group and start reading together.</p>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
</div>

<p>
    Already have an account?
    <a href="{% url 'login' %}">Login</a>
</p>
{% endblock %}
